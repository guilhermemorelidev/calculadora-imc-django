{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste Django</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h2 class="mb-4 text-center">Teste de Formulário</h2>

    <form method="POST" action="{% url 'pagina2' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Digite algo:</label>
        <input type="text" name="texto" class="form-control" placeholder="Digite aqui..." required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Enviar</button>
    </form>

  </div>
</div>

</body>
</html>
