{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SENAI | CALCULADORA IMC</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --neon-pink: #ff006e;
        --neon-cyan: #00f5ff;
        --neon-purple: #8b5cf6;
        --neon-blue: #3b82f6;
        --dark-bg: #0a0e27;
        --dark-card: rgba(15, 23, 42, 0.7);
      }

      body {
        font-family: "Rajdhani", sans-serif;
        background: linear-gradient(
          135deg,
          #0a0e27 0%,
          #1a1433 50%,
          #2d1b4e 100%
        );
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background-image:
          linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px),
          linear-gradient(0deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: gridMove 20s linear infinite;
        pointer-events: none;
      }

      @keyframes gridMove {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(50px, 50px);
        }
      }

      body::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(circle, rgba(255, 0, 110, 0.1) 0%, transparent 50%),
          radial-gradient(
            circle at 80% 80%,
            rgba(0, 245, 255, 0.1) 0%,
            transparent 50%
          );
        animation: pulse 8s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.1);
        }
      }

      .container {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 50px 40px;
        border-radius: 25px;
        box-shadow:
          0 0 60px rgba(255, 0, 110, 0.3),
          0 0 100px rgba(0, 245, 255, 0.2),
          inset 0 0 60px rgba(255, 255, 255, 0.02);
        width: 100%;
        max-width: 500px;
        position: relative;
        z-index: 1;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-family: "Orbitron", sans-serif;
        font-weight: 900;
        font-size: 32px;
        text-align: center;
        margin-bottom: 40px;
        background: linear-gradient(
          135deg,
          var(--neon-cyan),
          var(--neon-pink),
          var(--neon-purple)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
        letter-spacing: 4px;
        position: relative;
      }

      h1::after {
        content: "";
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
        border-radius: 2px;
        box-shadow: 0 0 10px var(--neon-cyan);
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 25px;
      }

      .input-group {
        position: relative;
      }

      label {
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 10px;
        display: block;
        color: var(--neon-cyan);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-family: "Orbitron", sans-serif;
      }

      input {
        width: 100%;
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(0, 245, 255, 0.3);
        border-radius: 12px;
        font-size: 18px;
        font-family: "Rajdhani", sans-serif;
        font-weight: 500;
        color: #ffffff;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      input:focus {
        outline: none;
        border-color: var(--neon-cyan);
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 20px rgba(0, 245, 255, 0.4),
          inset 0 0 20px rgba(0, 245, 255, 0.1);
      }

      button {
        background: linear-gradient(
          135deg,
          var(--neon-pink),
          var(--neon-purple)
        );
        color: white;
        padding: 18px;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 700;
        font-family: "Orbitron", sans-serif;
        letter-spacing: 3px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
        margin-top: 15px;
      }

      button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transition: left 0.5s;
      }

      button:hover::before {
        left: 100%;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow:
          0 0 30px var(--neon-pink),
          0 10px 40px rgba(255, 0, 110, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      .resultado-box {
        margin-top: 35px;
        padding: 30px;
        background: linear-gradient(
          135deg,
          rgba(0, 245, 255, 0.1),
          rgba(255, 0, 110, 0.1)
        );
        border: 2px solid;
        border-image: linear-gradient(
            135deg,
            var(--neon-cyan),
            var(--neon-pink)
          )
          1;
        border-radius: 15px;
        text-align: center;
        position: relative;
        overflow: hidden;
        animation: resultFadeIn 0.5s ease-out;
      }

      @keyframes resultFadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .resultado-box::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent,
          rgba(0, 245, 255, 0.1),
          transparent
        );
        animation: shimmer 3s infinite;
      }

      @keyframes shimmer {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .resultado-box h2 {
        font-family: "Orbitron", sans-serif;
        font-size: 48px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--neon-cyan),
          #ffffff,
          var(--neon-pink)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
        text-shadow: 0 0 30px rgba(0, 245, 255, 0.6);
        position: relative;
        z-index: 1;
      }

      .resultado-box p {
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
        position: relative;
        z-index: 1;
      }

      .footer {
        margin-top: 35px;
        font-size: 12px;
        text-align: center;
        color: rgba(255, 255, 255, 0.4);
        font-family: "Orbitron", sans-serif;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .decorative-circle {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }

      .circle-1 {
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(255, 0, 110, 0.2),
          transparent
        );
        top: -150px;
        right: -150px;
        animation: float 6s ease-in-out infinite;
      }

      .circle-2 {
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(0, 245, 255, 0.2),
          transparent
        );
        bottom: -100px;
        left: -100px;
        animation: float 8s ease-in-out infinite reverse;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(20px, 20px);
        }
      }

      @media (max-width: 600px) {
        .container {
          padding: 40px 30px;
          margin: 20px;
        }

        h1 {
          font-size: 24px;
          letter-spacing: 2px;
        }

        .resultado-box h2 {
          font-size: 36px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>SENAI IMC</h1>

      <form method="POST">
        {% csrf_token %}

        <div class="input-group">
          <label for="peso">Peso (kg)</label>
          <input
            type="number"
            step="0.01"
            name="peso"
            id="peso"
            placeholder="85.50"
            required
          />
        </div>

        <div class="input-group">
          <label for="altura">Altura (m)</label>
          <input
            type="number"
            step="0.01"
            name="altura"
            id="altura"
            placeholder="1.75"
            required
          />
        </div>

        <button type="submit">Calcular</button>
      </form>

      {% if resultado %}
      <div class="resultado-box">
        <h2>{{ resultado }}</h2>
        <p>{{ classificacao }}</p>
      </div>
      {% endif %}

      <div class="footer">Python • Django</div>
    </div>
  </body>
</html>
