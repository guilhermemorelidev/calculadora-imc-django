{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conta Letras</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body { padding: 24px 0; }
    textarea { min-height: 220px; }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="h4 mb-3">Conta Letras</h1>

    <form method="post" action="{% url 'contar_letras' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label for="texto" class="form-label">Seu texto</label>
        <textarea
          id="texto"
          name="texto"
          class="form-control"
          placeholder="Cole ou digite aqui…"
        >{{ texto|default:'' }}</textarea>
      </div>

      <button type="submit" class="btn btn-primary">Contar</button>
    </form>

    <div class="mt-4">
      <div class="card">
        <div class="card-body">
          <div class="fw-semibold">Letras</div>
          <div class="display-6 mb-0">
            {% if resultado %}{{ resultado.letras }}{% else %}0{% endif %}
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
