{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      h1 {
        color: #333;
      }
      form {
        margin-top: 20px;
      }
      label {
        display: block;
        margin-bottom: 5px;
      }
      input[type="number"] {
        padding: 8px;
        width: 200px;
        margin-bottom: 10px;
      }
      button {
        padding: 10px 20px;
        background-color: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
    <title>Conversor de Unidades</title>
  </head>
  <body>
    <h1>Conversor de Unidades</h1>
    <form method="post">
      {% csrf_token %}
      <label for="valor_reais">Valor em Reais:</label>
      <input type="number" id="valor_reais" name="valor_reais" step="0.01" />
      <button type="submit">Converter</button>
      {% if valor_dolar %}
        <p>Valor em Dólares: {{ valor_dolar|floatformat:2 }}</p>
      {% endif %}
      
    </form>
  </body>
</html>
